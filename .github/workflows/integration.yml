name: Integration checks

on:
  push:
    branches:
      - dev-branch
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  laravel-integration:
    name: Laravel and frontend integration
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: bcmath, ctype, curl, dom, fileinfo, filter, iconv, mbstring, openssl, pdo, pdo_sqlite, sqlite3, tokenizer, xml
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Validate Composer metadata
        run: composer validate --strict --no-check-publish

      - name: Install PHP dependencies
        run: composer install --prefer-dist --no-interaction --no-progress

      - name: Prepare integration environment
        run: |
          cp .env.example .env
          touch database/database.sqlite
          php artisan key:generate
          php artisan migrate --force

      - name: Run Laravel tests
        run: php artisan test

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Verify routes boot
        run: php artisan route:list
