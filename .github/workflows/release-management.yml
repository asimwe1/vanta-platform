name: Release management

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release tag, for example v1.0.0'
        required: true
        type: string
      target:
        description: 'Branch or commit SHA to tag'
        required: true
        default: master
        type: string
      prerelease:
        description: 'Mark this release as a prerelease'
        required: true
        default: false
        type: boolean
      notes:
        description: 'Release notes'
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: vanta-release-management
  cancel-in-progress: false

jobs:
  create-release:
    name: Create tag and GitHub release
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Validate version input
        run: |
          if ! [[ "${{ inputs.version }}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][A-Za-z0-9]+)?$ ]]; then
            echo "Version must look like v1.0.0 or v1.0.0-rc1"
            exit 1
          fi

      - name: Checkout target
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.target }}
          fetch-depth: 0

      - name: Ensure target is on master
        run: |
          git fetch origin master --prune
          if ! git merge-base --is-ancestor HEAD origin/master; then
            echo "Release targets must be master or a commit contained in master."
            exit 1
          fi

      - name: Configure Git author
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Ensure tag does not exist
        run: |
          git fetch --tags origin
          if git rev-parse "${{ inputs.version }}" >/dev/null 2>&1; then
            echo "Tag ${{ inputs.version }} already exists."
            exit 1
          fi

      - name: Create and push annotated tag
        run: |
          git tag -a "${{ inputs.version }}" -m "Release ${{ inputs.version }}"
          git push origin "${{ inputs.version }}"

      - name: Write release notes
        run: |
          cat > /tmp/release-notes.md <<'NOTES'
          ${{ inputs.notes }}
          NOTES
          if [ ! -s /tmp/release-notes.md ]; then
            printf 'Private Vanta platform release %s.\n' "${{ inputs.version }}" > /tmp/release-notes.md
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          flags=()
          if [ "${{ inputs.prerelease }}" = "true" ]; then
            flags+=(--prerelease)
          fi

          gh release create "${{ inputs.version }}" \
            --repo "${{ github.repository }}" \
            --target "${{ inputs.target }}" \
            --title "Vanta ${{ inputs.version }}" \
            --notes-file /tmp/release-notes.md \
            "${flags[@]}"
